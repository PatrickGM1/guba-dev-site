{{ define "main" }}
  <a href="{{ .Site.BaseURL }}" class="back-link">← back</a>

  <article class="post">
    <header class="post-header">
      <h1>{{ .Title }}</h1>
      <p class="card-meta">{{ .Date.Format "January 2, 2006" }}</p>
    </header>
    <div class="post-content">
      {{ .Content }}
    </div>
  </article>
{{ end }}
